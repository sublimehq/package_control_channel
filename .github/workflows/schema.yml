name: Schema test

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: packagecontrol/st-schema-reviewer-action@a1bdfafb7e7b834226052dac79f23730ba09ef26
        with:
          test_repositories: true
